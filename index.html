<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Counter</title>

<style>
body{
background:black;
color:red;
font-family:Arial;
text-align:center;
margin-top:120px;
}

#counter{
font-size:60px;
transition:0.3s;
}

button{
background:red;
color:white;
border:none;
padding:15px 30px;
font-size:20px;
cursor:pointer;
margin-top:30px;
}
</style>

</head>

<body>

<h1 id="counter">0</h1>

<button onclick="increase()">...</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, runTransaction } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDUlwLPcHndB5aUX7OuRvR9VcHKEntoppM",
authDomain: "sayac-site.firebaseapp.com",
databaseURL: "https://sayac-site-default-rtdb.firebaseio.com",
projectId: "sayac-site",
storageBucket: "sayac-site.firebasestorage.app",
messagingSenderId: "910377077312",
appId: "1:910377077312:web:1b5bb5521c302091096da5"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const counterRef = ref(db, "counter");

onValue(counterRef, (snapshot) => {
let value = snapshot.val() || 0;

const el = document.getElementById("counter");

el.innerText = value;

el.style.transform = "scale(1.5)";
setTimeout(()=>{
el.style.transform = "scale(1)";
},200);

});

window.increase = function(){

runTransaction(counterRef,(current)=>{
return (current || 0) + 1;
});

}

</script>

</body>
</html>
