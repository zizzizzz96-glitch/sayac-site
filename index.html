<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Press Test</title>
</head>

<body>

<h2>Press Counter</h2>
<h1 id="count">0</h1>

<button onclick="press()">PRESS</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = "https://wfdznmedvdoakdjdogqh.supabase.co"
const supabaseKey = "sb_publishable_ErhCPnxIZz-5VKOvE1oPnA_5KwyISi_"

const supabase = supabase.createClient(supabaseUrl, supabaseKey)

let count = 0

async function press() {

count++

document.getElementById("count").innerText = count

let time = new Date().toLocaleTimeString()

await supabase
.from("presses")
.insert([
{
count: count,
time: time
}
])

}

</script>

</body>
</html>
