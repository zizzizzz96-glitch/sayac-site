<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Visitor Counter</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>Ziyaretçi Sayacı</h1>
<p id="count">Yükleniyor...</p>

<script>

const supabaseUrl = "https://wfdznmedvdoakdjdogqh.supabase.co";

const supabaseKey = "sb_publishable_ErhCPnxIZz-5VKOvE1oPnA_5KwyISi_";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

async function addVisitor(lat, lon) {

await supabase
.from("visitors")
.insert([
{
latitude: lat,
longitude: lon
}
]);

}

async function getCount(){

let { count } = await supabase
.from("visitors")
.select("*", { count: "exact", head: true });

document.getElementById("count").innerText =
"Toplam ziyaretçi: " + count;

}

navigator.geolocation.getCurrentPosition(async (pos)=>{

let lat = pos.coords.latitude;
let lon = pos.coords.longitude;

await addVisitor(lat,lon);

getCount();

});

</script>

</body>
</html>
