<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Press Counter</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:50px;
background:#f5f5f5;
}

button{
font-size:30px;
padding:20px 40px;
}

#count{
font-size:50px;
margin:20px;
}

#clock{
font-size:25px;
margin:10px;
}
</style>

</head>

<body>

<h1>Press Counter</h1>

<div id="clock"></div>

<div id="count">0</div>

<button onclick="press()">PRESS</button>

<script>

const supabaseUrl = "https://wfdznmedvdoakdjdogqh.supabase.co"

const supabaseKey = "sb_publishable_ErhCPnxIZz-5VKOvE1oPnA_5KwyISi_"

const supabase = supabase.createClient(supabaseUrl, supabaseKey)

let count = 0

function updateClock(){
const now = new Date()
document.getElementById("clock").innerText = now.toLocaleTimeString()
}

setInterval(updateClock,1000)

function press(){

count++

document.getElementById("count").innerText = count

navigator.geolocation.getCurrentPosition(async function(pos){

const lat = pos.coords.latitude
const lng = pos.coords.longitude

await supabase
.from("presses")
.insert([
{
lat: lat,
lng: lng
}
])

})

}

</script>

</body>
</html>
