<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>

<body style="background:black;color:white;text-align:center;margin-top:100px;font-size:30px">

<div id="count">0</div>

<button onclick="press()">PRESS</button>

<script>
let count = 0;

function press(){
  count++;
  document.getElementById("count").innerText = count;
}
</script>

</body>
</html>
