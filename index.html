<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Site Sayacı</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin-top:120px;
}

h1{
font-size:40px;
margin-bottom:20px;
}

#counter{
font-size:80px;
font-weight:bold;
color:#00ffcc;
transition:0.3s;
}

#clock{
font-size:30px;
margin-top:10px;
color:#ff4d4d;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
border:none;
border-radius:10px;
background:#00ffcc;
color:black;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00ccaa;
transform:scale(1.05);
}

</style>

</head>

<body>

<h1>🚀 Site Sayacı</h1>

<div id="counter">0</div>

<div id="clock">00:00:00</div>

<button onclick="arttir()">Ziyaret Et</button>


<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "APIKEY",
authDomain: "PROJECT.firebaseapp.com",
databaseURL: "https://PROJECT-default-rtdb.firebaseio.com/",
projectId: "PROJECT",
storageBucket: "PROJECT.appspot.com",
messagingSenderId: "ID",
appId: "APPID"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();
var counterRef = db.ref("counter");

counterRef.on("value", function(snapshot){
document.getElementById("counter").innerText = snapshot.val();
});

function arttir(){
counterRef.transaction(function(current){
return (current || 0) + 1;
});
}

function saatGuncelle(){

var now = new Date();

var saat = String(now.getHours()).padStart(2,"0");
var dakika = String(now.getMinutes()).padStart(2,"0");
var saniye = String(now.getSeconds()).padStart(2,"0");

document.getElementById("clock").innerText =
saat + ":" + dakika + ":" + saniye;

}

setInterval(saatGuncelle,1000);
saatGuncelle();

</script>

</body>
</html>
