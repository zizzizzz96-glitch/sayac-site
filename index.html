<!DOCTYPE html>
<html>
<head>
<title>Buton Sayacı</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="text-align:center;font-family:Arial">

<h1>Butona Bas</h1>

<h2 id="count">Yükleniyor...</h2>

<button onclick="increase()">Tıkla</button>

<h3 id="clock"></h3>

<script>

const supabaseUrl = "https://wfdznmedvdoakdjdogqh.supabase.co"
const supabaseKey = "sb_publishable_ErhCPnxIZz-5VKOvE1oPnA_5KwyISi_"

const supabase = supabase.createClient(supabaseUrl, supabaseKey)

async function loadCount(){

let { data } = await supabase
.from('click_counter')
.select('count')
.eq('id',1)
.single()

document.getElementById("count").innerText = data.count

}

async function increase(){

let { data } = await supabase
.from('click_counter')
.select('count')
.eq('id',1)
.single()

let newCount = data.count + 1

await supabase
.from('click_counter')
.update({count:newCount})
.eq('id',1)

loadCount()

}

loadCount()

function clock(){

let now = new Date()

document.getElementById("clock").innerText =
now.toLocaleTimeString()

}

setInterval(clock,1000)

</script>

</body>
</html>
