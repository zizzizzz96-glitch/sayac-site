<!DOCTYPE html>
<html>
<head>
<title>Sayac Site</title>
</head>

<body style="text-align:center;font-family:Arial">

<h1>Site Sayacı</h1>

<h2 id="sayac">0</h2>

<button onclick="arttir()">Arttır</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
var firebaseConfig = {
apiKey: "AIzaSyDUlwLPcHndB5aUX7Ou",
authDomain: "sayac-site.firebaseapp.com",
databaseURL: "https://sayac-site-default-rtdb.firebaseio.com/",
projectId: "sayac-site",
storageBucket: "sayac-site.appspot.com",
messagingSenderId: "910377077312",
appId: "1:910377077312:web"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database().ref("counter");

db.on("value", function(snapshot){
document.getElementById("sayac").innerText = snapshot.val();
});

function arttir(){
db.set(firebase.database.ServerValue.increment(1));
}
</script>

</body>
</html>
