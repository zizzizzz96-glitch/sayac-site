<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test</title>
</head>

<body style="text-align:center;font-family:Arial;margin-top:100px;">

<h1>Site Test</h1>

<h2 id="clock"></h2>

<h2 id="counter">0</h2>

<button onclick="arttir()">Arttır</button>

<script>

function saat(){
  const now = new Date();
  document.getElementById("clock").innerText = now.toLocaleTimeString();
}

setInterval(saat,1000);

let sayac = 0;

function arttir(){
  sayac++;
  document.getElementById("counter").innerText = sayac;
}

</script>

</body>
</html>
