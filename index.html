<!DOCTYPE html>
<html>
<head>
<title>Site Sayacı</title>
</head>

<body style="text-align:center;font-family:Arial">

<h1>Site Sayacı</h1>

<h2 id="counter">0</h2>

<button onclick="arttir()">Arttır</button>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

var firebaseConfig = {
apiKey: "APIKEY",
authDomain: "sayac-site.firebaseapp.com",
databaseURL: "https://sayac-site-default-rtdb.firebaseio.com",
projectId: "sayac-site",
storageBucket: "sayac-site.appspot.com",
messagingSenderId: "123456",
appId: "APPID"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();

var counterRef = db.ref("counter");

counterRef.on("value", function(snapshot){
document.getElementById("counter").innerText = snapshot.val();
});

function arttir(){
counterRef.set((parseInt(document.getElementById("counter").innerText) || 0) + 1);
}

</script>
  function updateClock(){
let now = new Date();
let time = now.toLocaleTimeString();
document.getElementById("clock").innerText = time;
}

setInterval(updateClock,1000);
updateClock();

</body>
<h2 id="clock"></h2>
</html>
