<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ziyaretçi Sayacı</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body style="text-align:center;font-family:Arial">

<h1>Site Ziyaretçi Sayacı</h1>

<h2 id="counter">0</h2>

<button onclick="arttir()">Sayaç Artır</button>

<h3 id="clock"></h3>

<script>

var firebaseConfig = {
  apiKey: "AIzaSyDUlwLPcHndB5aUX7OuRvR9VcHKEntoppM",
  authDomain: "sayac-site.firebaseapp.com",
  databaseURL: "https://sayac-site-default-rtdb.firebaseio.com",
  projectId: "sayac-site",
  storageBucket: "sayac-site.firebasestorage.app",
  messagingSenderId: "910377077312",
  appId: "1:910377077312:web:1b5bb5521c302091096da5"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database();
var ref = db.ref("sayac");

ref.on("value", function(snapshot){
  document.getElementById("counter").innerText = snapshot.val() || 0;
});

function arttir(){
  ref.transaction(function(current){
    return (current || 0) + 1;
  });
}

function saat(){
  var now = new Date();
  document.getElementById("clock").innerText =
  now.toLocaleTimeString();
}

setInterval(saat,1000);

</script>

</body>
</html>
