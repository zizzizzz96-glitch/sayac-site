<!DOCTYPE html>
<html>
<head>
<title>Site Sayacı</title>
</head>

<body style="text-align:center;font-family:sans-serif">

<h1>Site Sayacı</h1>

<h2 id="counter">0</h2>

<button onclick="arttir()">Arttır</button>

<script>

let url = "https://api.countapi.xyz/hit/zizzizzz96/sayac";

function arttir(){
fetch(url)
.then(res => res.json())
.then(data => {
document.getElementById("counter").innerText = data.value;
});
}

</script>

</body>
</html>
